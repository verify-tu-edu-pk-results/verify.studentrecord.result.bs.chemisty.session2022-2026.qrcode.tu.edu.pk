<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Sign In | Thal University Result System</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-shell">
  <div class="login-grid">

    <div class="login-hero">
      <img src="assets/logo.png" alt="Thal University" class="hero-logo">
      <div class="badge">RESULT VERIFICATION SYSTEM</div>
      <h1>Manage student results and share verified records with one QR scan.</h1>
    </div>

    <div class="login-panel">
      <div class="eyebrow">ADMIN PORTAL</div>
      <h2>Sign in</h2>
      <p class="desc">Sign in with the administrator account created in your Firebase console.</p>

      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label for="email">Email Address</label>
          <div class="input-group">
            <span class="icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 6l-10 7L2 6"/><path d="M2 6h20v12H2z"/></svg>
            </span>
            <input type="email" id="email" name="email" placeholder="admin@example.com" required>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-group">
            <span class="icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          <span id="loginBtnText">Login</span>
        </button>

        <div class="login-error hidden" id="loginError"></div>
      </form>
    </div>

  </div>
</div>

<script src="firebase-config.js"></script>
<script type="module" src="app-login.js"></script>
</body>
</html>
